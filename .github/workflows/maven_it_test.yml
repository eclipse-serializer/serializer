# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Integration tests (vmt)

permissions:
  contents: read
  checks: write

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]

jobs:
  integration-tests:

    runs-on: ubuntu-latest

    steps:
      #Build with java 17
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build reactor dependencies (no tests)
        run: mvn -P IT -B clean install -DskipTests -pl integration-tests -am --file pom.xml -Dgpg.skip=true
      - name: Run integration tests
        run: mvn -P IT -B test -pl integration-tests --file pom.xml -Dgpg.skip=true

      - name: Report JUnit results (dorny - surefire)
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: "Serializer Integration tests (vmt) Results"
          path: 'integration-tests/target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false
