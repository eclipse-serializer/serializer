# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Make release

on:
  release:
    types: [created]

jobs:
  build-native:
    uses: ./.github/workflows/maven_jni_25.yml

  publish:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25 for publishing
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: nativememory/target/libs
          merge-multiple: 'true'

      - name: Set project version
        run: mvn versions:set -DnewVersion=${{ github.event.release.tag_name }} --batch-mode

      - name: Deploy everything in one shot
        run: mvn -Pdeploy -Pproduction -P '!native-build' --no-transfer-progress --batch-mode clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_SONATYPE_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.ORG_GPG_PASSPHRASE }}
          MAVEN_GPG_KEY: ${{ secrets.ORG_GPG_PRIVATE_KEY }}

